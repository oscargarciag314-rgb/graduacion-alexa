<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Graduación de Alexa 🎓</title>
    <!-- Importamos el cliente de Supabase desde un CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #111b24 0%, #1c3144 100%);
            color: #f5f7fa;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 35px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        h1 { 
            color: #fff; 
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        p { 
            color: #a0aec0; 
            font-size: 1rem; 
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #00b4d8;
            padding: 40px 10px;
            border-radius: 15px;
            background-color: rgba(0, 180, 216, 0.05);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .upload-area:hover {
            background-color: rgba(0, 180, 216, 0.15);
            border-color: #90e0ef;
        }
        .upload-area p {
            margin: 15px 0 0 0;
            font-weight: bold;
            color: #00b4d8;
        }
        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        #status-container {
            margin-top: 25px;
            display: none;
        }
        .progress-bar {
            width: 100%;
            background-color: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            height: 12px;
            margin-top: 10px;
        }
        .progress {
            width: 0%;
            height: 100%;
            background-color: #00f5d4;
            transition: width 0.2s ease;
        }
        #status-text {
            font-size: 0.95rem;
            font-weight: bold;
            color: #90e0ef;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡La Graduación de Alexa! 🎓✨</h1>
        <p>¡Ayúdanos a capturar cada recuerdo! Sube aquí todas las fotos que te tomes durante la fiesta para guardarlas en el álbum.</p>
        
        <div class="upload-area" id="drop-zone">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#00b4d8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p>Toca aquí para subir tus fotos 📸</p>
            <!-- Acepta múltiples imágenes y activa la cámara directamente en móviles -->
            <input type="file" id="file-input" multiple accept="image/*">
        </div>

        <div id="status-container">
            <span id="status-text">Preparando archivos...</span>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN DE TU BASE DE DATOS SUPABASE
        // ==========================================
        // Reemplaza los siguientes valores con los que copiaste de tu panel de Supabase:
        const SUPABASE_URL = 'https://nwsbuuiyginbawtbtxym.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_nuvC0iDiUyP7hSirMEXz2g_8GrAb6nd';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const fileInput = document.getElementById('file-input');
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress');

        fileInput.addEventListener('change', async (event) => {
            const files = event.target.files;
            if (files.length === 0) return;

            statusContainer.style.display = 'block';
            progressBar.style.width = '0%';
            statusText.style.color = '#90e0ef';
            
            let uploadedCount = 0;
            const totalFiles = files.length;

            for (let i = 0; i < totalFiles; i++) {
                const file = files[i];
                
                // Creamos un nombre único usando timestamp y random string para evitar duplicados
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.${fileExt}`;

                statusText.innerText = `Subiendo foto ${i + 1} de ${totalFiles}...`;

                // Sube la foto al bucket "fotos" de Supabase
                const { data, error } = await supabase.storage
                    .from('fotos')
                    .upload(fileName, file, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (error) {
                    console.error('Error subiendo:', error.message);
                    statusText.innerText = `Error al subir la foto: ${file.name}`;
                    statusText.style.color = '#ff6b6b';
                    return;
                }

                uploadedCount++;
                const percentComplete = (uploadedCount / totalFiles) * 100;
                progressBar.style.width = `${percentComplete}%`;
            }

            statusText.innerText = `¡Listo! Las ${totalFiles} fotos se subieron con éxito. 🎉`;
            statusText.style.color = '#00f5d4';
            fileInput.value = ''; // Limpia el input para que puedan volver a seleccionar
        });
    </script>
</body>
</html>
